# Cache Cargo registry and target folders to drastically speed up future builds
variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo_cache

cache:
  # Using the lockfile as the key ensures the cache resets when dependencies change
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo_cache/bin/
    - .cargo_cache/registry/index/
    - .cargo_cache/registry/cache/
    - .cargo_cache/git/db/
    - target/

stages:
  - build
  - release

# ── Linux Build Job ──────────────────────────────────────────────────────────
build_linux:
  stage: build
  image: rust:latest
  before_script:
    # Install the D-Bus headers required by your mpris dependency [cite: 69]
    - apt-get update && apt-get install -y libdbus-1-dev
  script:
    - cargo build --release
    # Move the generated man page to a predictable location for the artifacts
    - find target/release/build -name "lyt.1" -exec cp {} . \;
  artifacts:
    name: "lyric-tui-linux"
    paths:
      - target/release/lyt   
      - lyt.1               
    expire_in: 1 week

# ── Windows Build Job ────────────────────────────────────────────────────────
build_windows:
  stage: build
  image: rust:latest
  before_script:
    # Install cargo-xwin to handle MSVC linking [cite: 1]
    - cargo install cargo-xwin || true
    - rustup target add x86_64-pc-windows-msvc
  script:
    - cargo xwin build --release --target x86_64-pc-windows-msvc
  artifacts:
    name: "lyric-tui-windows"
    paths:
      - target/x86_64-pc-windows-msvc/release/lyt.exe 
    expire_in: 1 week

# ── GitLab Releases ──────────────────────────────────────────────────────────

# 1. Preparatory job to parse the changelog and export the notes
extract_release_notes:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG                 # Only run when a tag is pushed
  script:
    - echo "Extracting release notes for $CI_COMMIT_TAG..."
    - apk add --no-cache awk
    - EXTRA_DESCRIPTION=$(awk "/^## \\[$CI_COMMIT_TAG\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md || echo "Automated release generated for $CI_COMMIT_TAG")
    - echo "RELEASE_NOTES=$EXTRA_DESCRIPTION" >> build.env
  artifacts:
    reports:
      dotenv: build.env                  # Pass the variables to subsequent jobs
      
release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: extract_release_notes
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG                 # Only run this job when a tag is pushed
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: '$RELEASE_NOTES'        # Dynamically populated from the dotenv artifact
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'
    assets:
      links:
        - name: 'Linux Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/release/lyt?job=build_linux'
        - name: 'Windows Executable'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-pc-windows-msvc/release/lyt.exe?job=build_windows'